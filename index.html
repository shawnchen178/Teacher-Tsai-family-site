<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家人看盤入口</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
    }
    .wrap {
      width: min(92vw, 520px);
      text-align: center;
      padding: 28px 24px;
      border: 1px solid #1f2937;
      border-radius: 14px;
      background: #050505;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    p {
      margin: 0 0 18px;
      color: #cbd5e1;
      line-height: 1.6;
      font-size: 15px;
    }
    a.btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: #2563eb;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
    }
    a.btn:hover { background: #1d4ed8; }
    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #94a3b8;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>家人看盤入口</h1>
    <p>此靜態頁面已停用。<br/>請改由正式登入站查看資料。</p>
    <a class="btn" href="https://mr-tsai.onrender.com/login">前往登入站</a>
    <div class="hint">https://mr-tsai.onrender.com/login</div>
  </main>
</body>
</html>
